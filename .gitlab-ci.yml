# GitLab CI/CD → Build image → Push to GitLab Container Registry → Update Railway + Deploy
#
# On container startup (see Dockerfile): migrations → seed (idempotent) → uvicorn
# Seeding also happens automatically on FastAPI startup (lifespan hook)
#
# GitLab CI/CD variables (Settings → CI/CD → Variables, all masked):
#   RAILWAY_TOKEN  - No Team token from https://railway.app/account/tokens
#   RAILWAY_ENV_ID - Environment ID (Railway: Cmd/Ctrl+K → Copy Environment ID)
#
# Railway one-time setup:
#   1. Create service with "Deploy from Docker image" source
#   2. Add GitLab registry credentials (Pro plan): Settings → Registry Credentials
#      - Username: GitLab username or deploy token
#      - Password: Personal access token with read_registry scope
#   3. Set SVC_ID below to your service ID (Cmd/Ctrl+K → Copy Service ID)

stages:
  - build
  - deploy

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest
  SVC_ID: "a72c8bc5-eba6-4fbc-9e11-a4772215a974"

build-and-push:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_TAG -t $IMAGE_LATEST .
    - docker push $IMAGE_TAG
    - docker push $IMAGE_LATEST
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

railway-deploy:
  stage: deploy
  image: curlimages/curl:latest
  needs: [build-and-push]
  script:
    # Step 1: Update Railway service source image to the newly built GitLab image
    - |
      curl -sS -f -X POST https://backboard.railway.app/graphql/v2 \
        -H "Authorization: Bearer $RAILWAY_TOKEN" \
        -H "Content-Type: application/json" \
        -d "{\"query\":\"mutation ServiceInstanceUpdate($serviceId: String!, $environmentId: String!, $input: ServiceInstanceUpdateInput!) { serviceInstanceUpdate(serviceId: $serviceId, environmentId: $environmentId, input: $input) }\",\"variables\":{\"serviceId\":\"$SVC_ID\",\"environmentId\":\"$RAILWAY_ENV_ID\",\"input\":{\"source\":{\"image\":\"$IMAGE_TAG\"}}}}"
    # Step 2: Trigger deployment with the new image (DeployV2 pulls updated tag)
    - |
      curl -sS -f -X POST https://backboard.railway.app/graphql/v2 \
        -H "Authorization: Bearer $RAILWAY_TOKEN" \
        -H "Content-Type: application/json" \
        -d "{\"query\":\"mutation serviceInstanceDeployV2($serviceId: String!, $environmentId: String!) { serviceInstanceDeployV2(serviceId: $serviceId, environmentId: $environmentId) }\",\"variables\":{\"serviceId\":\"$SVC_ID\",\"environmentId\":\"$RAILWAY_ENV_ID\"}}"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
