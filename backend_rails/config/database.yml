default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: localhost
  port: 5433
  username: postgres
  password: postgres

development:
  <<: *default
  database: tava_development

test:
  <<: *default
  database: tava_test

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
